// rag.js inline
/**
 * RAG 知识库检索引擎 v2
 * BM25 + 三元组 + 语义加权
 * 目标：按需检索最相关的知识片段，减少对 LLM 的干扰
 */

const STOP_WORDS = new Set([
  '的', '了', '是', '在', '我', '有', '和', '就', '不', '人', '都', '一', '上', '也', '很', '到',
  '说', '要', '去', '你', '会', '着', '没', '看', '好', '自己', '这', '那', '里', '什么',
  '之', '的', '地', '得', '而', '其', '此', '与', '及', '或', '若', '如'
]);

function tokenize(text) {
  if (!text) return [];
  const cleaned = text.replace(/[，。！？、；：""''（）()【】\[\]…—\-]/g, ' ');
  const tokens = [];
  // 一元字（去除停用词）
  for (let i = 0; i < cleaned.length; i++) {
    const c = cleaned[i];
    if (/[一-鿿]/.test(c) && !STOP_WORDS.has(c)) {
      tokens.push({ t: c, n: 1 });
    }
  }
  // 二元组（语义更强）
  for (let i = 0; i < cleaned.length - 1; i++) {
    const c1 = cleaned[i], c2 = cleaned[i + 1];
    if (/[一-鿿]/.test(c1) && /[一-鿿]/.test(c2)) {
      if (!STOP_WORDS.has(c1) || !STOP_WORDS.has(c2)) {
        tokens.push({ t: c1 + c2, n: 2 });
      }
    }
  }
  // 三元组（专有名词命中率大幅提升，如"伤官见官"、"身强木弱"等）
  for (let i = 0; i < cleaned.length - 2; i++) {
    const c1 = cleaned[i], c2 = cleaned[i + 1], c3 = cleaned[i + 2];
    if (/[一-鿿]/.test(c1) && /[一-鿿]/.test(c2) && /[一-鿿]/.test(c3)) {
      tokens.push({ t: c1 + c2 + c3, n: 3 });
    }
  }
  return tokens;
}

// 文档切分器（增加标签系统）
function flattenKB(kb, sourceName) {
  const docs = [];
  // 标签映射：根据来源自动打标签
  const sourceTags = {
    '八字': ['命理', '八字', '五行'],
    '紫微': ['命理', '紫微', '星曜'],
    '六爻': ['占卜', '六爻', '周易'],
    '奇门': ['占卜', '奇门', '遁甲'],
    '姓名': ['命理', '姓名', '数理'],
    '手相': ['相术', '手相'],
    '面相': ['相术', '面相'],
    '风水': ['风水', '环境'],
    '择日': ['择吉', '时辰'],
    '周易': ['经典', '周易'],
    '中医': ['中医', '养生'],
    '倪海厦': ['经验', '实战'],
    '哲学': ['理论', '哲学']
  };
  // 提取标签
  let tags = [];
  for (const [key, vals] of Object.entries(sourceTags)) {
    if (sourceName.includes(key)) tags.push(...vals);
  }
  tags = [...new Set(tags)]; // 去重
  
  function walk(obj, path) {
    if (typeof obj === 'string') {
      if (obj.length < 4) return;
      docs.push({ text: obj, path: path.join('.'), source: sourceName, tags, tokens: tokenize(obj) });
    } else if (Array.isArray(obj)) {
      obj.forEach((v, i) => walk(v, [...path, i]));
    } else if (obj && typeof obj === 'object') {
      for (const [k, v] of Object.entries(obj)) {
        if (k === 'meta') continue;
        walk(v, [...path, k]);
      }
    }
  }
  walk(kb, []);
  return docs;
}

// BM25 索引（比 TF-IDF 鲁棒，更好处理长短文档）
class BM25Index {
  constructor(k1 = 1.5, b = 0.75) {
    this.k1 = k1;
    this.b = b;
    this.docs = [];
    this.docLens = [];
    this.avgDocLen = 0;
    this.df = new Map();
    this.N = 0;
  }

  add(docs) {
    for (const d of docs) {
      this.docs.push(d);
      this.docLens.push(d.tokens.length || 1);
      const seen = new Set();
      for (const t of d.tokens) {
        if (!seen.has(t.t)) {
          this.df.set(t.t, (this.df.get(t.t) || 0) + 1);
          seen.add(t.t);
        }
      }
    }
    this.N = this.docs.length || 1;
    this.avgDocLen = this.docLens.reduce((a, b) => a + b, 0) / this.N || 1;
  }

  // IDF（BM25 公式）
  idf(term) {
    const df = this.df.get(term) || 0;
    return Math.log((this.N - df + 0.5) / (df + 0.5) + 1);
  }

  // 单文档评分（增加来源权重）
  score(doc, docLen, qTokens) {
    const tf = new Map();
    for (const t of doc.tokens) tf.set(t.t, (tf.get(t.t) || 0) + 1);
    let s = 0;
    for (const q of qTokens) {
      const df = tf.get(q.t) || 0;
      if (!df) continue;
      const idf = this.idf(q.t);
      const denom = df + this.k1 * (1 - this.b + this.b * docLen / this.avgDocLen);
      s += idf * (df * (this.k1 + 1)) / denom;
    }
    // 核心经典权重提升
    const sourceBoost = {
      '增删卜易': 1.5,
      '奇门统宗': 1.5,
      '周易爻辞': 1.3,
      '周易爻辞2': 1.3,
      '周易爻辞3': 1.3,
      '周易爻辞4': 1.3,
      '周易爻辞5': 1.3,
      '周易爻辞6': 1.3,
      '周易爻辞7': 1.3,
      '周易爻辞8': 1.3,
      '周易爻辞9': 1.3,
      '周易爻辞10': 1.3,
      '周易爻辞11': 1.3,
      '周易爻辞12': 1.3,
      '周易爻辞13': 1.3,
      '周易爻辞14': 1.3,
      '周易爻辞15': 1.3,
      '倪海厦': 1.4,
      '易经哲学': 1.2,
      '命理哲学': 1.2
    };
    const boost = sourceBoost[doc.source] || 1.0;
    return s * boost;
  }

  search(query, topK = 5) {
    const qTokens = tokenize(query);
    if (qTokens.length === 0) return [];
    // 三元组加权
    const qWeight = qTokens.map(t => ({ ...t, weight: t.n }));
    const scores = [];
    for (let i = 0; i < this.docs.length; i++) {
      const s = this.score(this.docs[i], this.docLens[i], qWeight);
      if (s > 0) scores.push({ doc: this.docs[i], score: s });
    }
    scores.sort((a, b) => b.score - a.score);
    return scores.slice(0, topK);
  }
}

        const kb = await r.json();

    this.ready = true;
    console.log(`RAG BM25 索引建立: ${all.length} 个文档片段`);
  },

  // 从查询和排盘结果中提取信号词
  extractSignals(pan, question) {
    const signals = [];
    if (question) {
      signals.push(question);
      // 提取问题中的关键词（去除停用词）
      const qTokens = tokenize(question);
      const keyTokens = qTokens.filter(t => t.n >= 2).map(t => t.t);
      if (keyTokens.length > 0) signals.push(...keyTokens);
    }
    if (pan) {
      // 八字
      if (pan.gz) {
        signals.push(pan.gz.day, pan.gz.year, pan.gz.month, pan.gz.hour);
        if (pan.tenGods) {
          Object.values(pan.tenGods).forEach(v => v && signals.push(v));
        }
        // 新增：日主五行+旺衰
        const dayGan = pan.gz.day[0];
        if (dayGan) {
          const wxMap = { '甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水' };
          if (wxMap[dayGan]) signals.push(wxMap[dayGan] + pan.wangShuai);
        }
      }
      // 紫微
      if (pan.mingGong) {
        signals.push(pan.mingGong.name, pan.mingGong.ganzhi);
        if (pan.mingGong.stars) {
          pan.mingGong.stars.forEach(s => signals.push(s.name));
        }
        // 新增：四化
        if (pan.siHua) {
          Object.entries(pan.siHua).forEach(([k,v]) => signals.push(v + k));
        }
      }
      // 六爻
      if (pan.gua) {
        signals.push(pan.gua.name);
        if (pan.yaoList) {
          pan.yaoList.forEach(y => {
            signals.push(y.gan + y.zhi, y.liuqin, y.liushen, y.wuxing);
          });
        }
        // 新增：动爻信息
        if (pan.gua.dongYaoList && pan.gua.dongYaoList.length > 0) {
          signals.push('动爻' + pan.gua.dongYaoList.length + '个');
          if (pan.gua.dongYaoList.length > 3) signals.push('多动爻');
        }
        if (pan.huGua) signals.push('互卦' + pan.huGua);
      }
      // 奇门
      if (pan.gong9) {
        pan.gong9.forEach(g => {
          signals.push(g.dipan, g.tianpan, g.jiuxing, g.renpan, g.shenpan);
        });
        // 新增：值符值使
        const zf = pan.gong9.find(g => g.is_dipan_zhifu);
        const zs = pan.gong9.find(g => g.is_renpan_zhishi);
        if (zf) signals.push('值符' + zf.dipan);
        if (zs) signals.push('值使' + zs.renpan);
        // 新增：吉门凶门
        const sheng = pan.gong9.find(g => g.renpan === '生门');
        const si = pan.gong9.find(g => g.renpan === '死门');
        if (sheng) signals.push('生门' + sheng.name);
        if (si) signals.push('死门' + si.name);
      }
      // 姓名学
      if (pan.sancai) {
        signals.push(pan.sancai.tian + pan.sancai.ren + pan.sancai.di + '三才');
      }
      if (pan.wuge) {
        signals.push('人格' + pan.wuge.renge + '总格' + pan.wuge.zongge);
      }
    }
    return signals.join(' ');
  },

  search(pan, question, opts = {}) {
    if (!this.ready) return '';
    const { topK = 8, maxChars = 2500, source = null, minScore = 1.0, tags = null } = opts;
    const query = this.extractSignals(pan, question);
    let results = this.index.search(query, topK * 3);
    if (source) {
      results = results.filter(r => r.doc.source === source);
    }
    // 标签过滤
    if (tags && tags.length > 0) {
      results = results.filter(r => r.doc.tags && tags.some(t => r.doc.tags.includes(t)));
    }
    results = results.slice(0, topK).filter(r => r.score >= minScore);

    if (results.length === 0) {
      // fallback: 用问题直接检索
      results = this.index.search(question || '吉凶', topK).filter(r => r.score >= minScore * 0.4);
    }

    if (results.length === 0) return '';

    const lines = ['【知识库相关片段（BM25语义检索）】'];
    let totalLen = 0;
    for (const r of results) {
      const tagStr = r.doc.tags ? `(${r.doc.tags.join('/')})` : '';
      const line = `· [${r.doc.source}]${tagStr} ${r.doc.text}`;
      if (totalLen + line.length > maxChars) break;
      lines.push(line);
      totalLen += line.length;
    }
    return '\n' + lines.join('\n') + '\n';
  }
};

window.RAG = RAG;

  for (const { wx: w, group } of SAN_HE) {

    if (hits.length === 3) {
      facts.push(`【事实·三合局】四柱全${hits.join('、')}，合${w}局成`);
    } else if (hits.length === 2) {
      facts.push(`【事实·半合】四柱见${hits.join('、')}，半合${w}局`);
    }
  }

  // 【新增】十二长生（按日主查各支位）
  const CHANG_SHENG = {
    '木': { '亥':'长生', '子':'沐浴', '丑':'冠带', '寅':'临官', '卯':'帝旺', '辰':'衰', '巳':'病', '午':'死', '未':'墓', '申':'绝', '酉':'胎', '戌':'养' },
    '火': { '寅':'长生', '卯':'沐浴', '辰':'冠带', '巳':'临官', '午':'帝旺', '未':'衰', '申':'病', '酉':'死', '戌':'墓', '亥':'绝', '子':'胎', '丑':'养' },
    '土': { '寅':'长生', '卯':'沐浴', '辰':'冠带', '巳':'临官', '午':'帝旺', '未':'衰', '申':'病', '酉':'死', '戌':'墓', '亥':'绝', '子':'胎', '丑':'养' },
    '金': { '巳':'长生', '午':'沐浴', '未':'冠带', '申':'临官', '酉':'帝旺', '戌':'衰', '亥':'病', '子':'死', '丑':'墓', '寅':'绝', '卯':'胎', '辰':'养' },
    '水': { '申':'长生', '酉':'沐浴', '戌':'冠带', '亥':'临官', '子':'帝旺', '丑':'衰', '寅':'病', '卯':'死', '辰':'墓', '巳':'绝', '午':'胎', '未':'养' }
  };
  const cs = CHANG_SHENG[wx];
  if (cs) {
    for (const k of ['year','month','day','hour']) {
      const z = gz[k][1];
      const kName = k === 'year' ? '年支' : k === 'month' ? '月支' : k === 'day' ? '日支' : '时支';
      if (cs[z]) {
        facts.push(`【事实·十二长生】日主${wx}在${kName}${z}处于${cs[z]}状态`);
      }
    }
  }

  // 【新增】当前大运（按当前年）天干对日主十神
  if (pan.daYun) {
    const now = new Date();
    const y = now.getFullYear();
    const cur = pan.daYun.find(d => y >= d.startYear && y <= d.endYear);
    if (cur && window.tenGodRelation) {
      const daYunGan = cur.ganZhi[0];
      const daYunZhi = cur.ganZhi[1];
      const tgs = window.tenGodRelation(tg, daYunGan);
      facts.push(`【事实·当前大运】${cur.startYear}-${cur.endYear}年：${cur.ganZhi}（天干对日主为${tgs || '同我'}，地支${daYunZhi}属${DZ_WX[daYunZhi] || ''}）`);
    }
  }

  // 【新增】流年分析（当前年份与命局互动）
  if (pan.liuNian) {
    const ln = pan.liuNian;
    facts.push(`【事实·流年】${new Date().getFullYear()}年：${ln.ganZhi}（流年天干对日主为${ln.shiShen || '同我'}）`);

    const lnZhi = ln.ganZhi[1];
    const lnGan = ln.ganZhi[0];
    const lnWx = DZ_WX[lnZhi];

    // 流年地支与命局地支的刑冲合会
    const zhiList = ['year','month','day','hour'].map(k => ({ k, z: gz[k][1] }));

    // 冲
    if (LIU_CHONG[lnZhi]) {
      for (const { k, z } of zhiList) {
        if (LIU_CHONG[lnZhi] === z) {
          facts.push(`【事实·流年冲】流年${lnZhi}冲${k==='year'?'年':k==='month'?'月':k==='day'?'日':'时'}支${z}（冲动该柱，主变动）`);
        }
      }
    }
    // 合
    if (LIU_HE[lnZhi]) {
      for (const { k, z } of zhiList) {
        if (LIU_HE[lnZhi] === z && z !== lnZhi) {
          facts.push(`【事实·流年合】流年${lnZhi}合${k==='year'?'年':k==='month'?'月':k==='day'?'日':'时'}支${z}（合绊该柱，主牵绊）`);
        }
      }
    }
    // 刑（寅巳申、丑戌未、子卯）
    const SAN_XING = [['寅','巳','申'], ['丑','戌','未'], ['子','卯']];
    for (const xingGroup of SAN_XING) {
      if (xingGroup.includes(lnZhi)) {
        for (const { k, z } of zhiList) {
          if (xingGroup.includes(z) && z !== lnZhi) {
            facts.push(`【事实·流年刑】流年${lnZhi}刑${k==='year'?'年':k==='month'?'月':k==='day'?'日':'时'}支${z}（刑伤，主是非病灾）`);
          }
        }
      }
    }
    // 害
    const LIU_HAI = { '子':'未','未':'子','丑':'午','午':'丑','寅':'巳','巳':'寅','卯':'辰','辰':'卯','申':'亥','亥':'申','酉':'戌','戌':'酉' };
    for (const { k, z } of zhiList) {
      if (LIU_HAI[lnZhi] === z) {
        facts.push(`【事实·流年害】流年${lnZhi}害${k==='year'?'年':k==='month'?'月':k==='day'?'日':'时'}支${z}（暗害，主小人暗算）`);
      }
    }

    // 太岁临日支（犯太岁/日值太岁）
    if (lnZhi === gz.day[1]) {
      facts.push(`【事实·日值太岁】流年地支${lnZhi}与日支相同（日值太岁，吉凶加倍）`);
    }
    // 太岁冲日支（冲太岁）
    if (LIU_CHONG[lnZhi] === gz.day[1]) {
      facts.push(`【事实·冲太岁】流年${lnZhi}冲日支${gz.day[1]}（冲太岁，主变动、动荡）`);
    }

    // 流年五行与日主旺衰的关系
    if (pan.wangShuai) {
      const shengWo = SHENGED[wx]; // 被生（印）
      const woSheng = SHENG[wx];   // 生（食伤）
      const keWo = KEED[wx];       // 被克（官杀）
      const woKe = KE[wx];         // 克（财）
      if (lnWx === shengWo) facts.push(`【事实·流年生助】流年${lnZhi}属${lnWx}，生助日主${wx}（印星流年，利学习、贵人）`);
      else if (lnWx === woSheng) facts.push(`【事实·流年泄耗】流年${lnZhi}属${lnWx}，日主${wx}生之（食伤流年，利才华发挥）`);
      else if (lnWx === keWo) facts.push(`【事实·流年克制】流年${lnZhi}属${lnWx}，克日主${wx}（官杀流年，主压力、变动）`);
      else if (lnWx === woKe) facts.push(`【事实·流年耗身】流年${lnZhi}属${lnWx}，日主${wx}克之（财星流年，利求财）`);
      else facts.push(`【事实·流年比和】流年${lnZhi}属${lnWx}，与日主${wx}同类（比劫流年，主竞争、合作）`);
    }

    // 大运+流年双重作用
    if (pan.daYun) {
      const now = new Date();
      const curDaYun = pan.daYun.find(d => now.getFullYear() >= d.startYear && now.getFullYear() <= d.endYear);
      if (curDaYun) {
        const dyGan = curDaYun.ganZhi[0];
        const dyZhi = curDaYun.ganZhi[1];
        // 大运地支与流年地支的关系
        if (LIU_CHONG[dyZhi] === lnZhi) facts.push(`【事实·运岁冲】大运${dyZhi}冲流年${lnZhi}（运岁相冲，该年变动大）`);
        else if (LIU_HE[dyZhi] === lnZhi) facts.push(`【事实·运岁合】大运${dyZhi}合流年${lnZhi}（运岁相合，该年有合绊之事）`);
        else if (dyZhi === lnZhi) facts.push(`【事实·运岁同】大运与流年地支同为${dyZhi}（伏吟，主反复、拖延）`);
      }
    }
  }

  return facts.length > 0 ? facts.join('\n') + '\n' : '';
};

Expert.liuyao = function(pan) {
  const facts = [];
  // 卦名+世应
  facts.push(`【事实·卦象】本卦：${pan.gua.name}`);

  // 动爻数量
  if (pan.gua.dongYaoList && pan.gua.dongYaoList.length > 0) {
    facts.push(`【事实·动爻】共${pan.gua.dongYaoList.length}个动爻：第${pan.gua.dongYaoList.join('、')}爻`);
  } else {
    facts.push(`【事实·动爻】无动爻，卦象静守`);
  }

  // 互卦
  if (pan.huGua) facts.push(`【事实·互卦】互卦为${pan.huGua}`);

  // 用神（六亲吉凶看旺衰）
  if (pan.yaoList) {
    const dongList = pan.yaoList.filter(y => y.isDong);
    if (dongList.length > 0) {
      facts.push(`【事实·动爻六亲】${dongList.map(y => `${y.name}${y.gan}${y.zhi}(${y.liuqin})`).join('、')}`);
    }

    // 妻财爻统计（求财关键）
    const caiYao = pan.yaoList.filter(y => y.liuqin === '妻财');
    if (caiYao.length > 0) {
      facts.push(`【事实·妻财爻】本卦有${caiYao.length}个妻财爻：${caiYao.map(y => `${y.name}(${y.isDong ? '动' : '静'})`).join('、')}`);
    }
    // 官鬼爻
    const guanYao = pan.yaoList.filter(y => y.liuqin === '官鬼');
    if (guanYao.length > 0) {
      facts.push(`【事实·官鬼爻】本卦有${guanYao.length}个官鬼爻：${guanYao.map(y => `${y.name}(${y.isDong ? '动' : '静'})`).join('、')}`);
    }

    // 【新增】世爻应爻（按64卦世应固定表）
    if (pan.gua.lines) {
      const shortName = GUA_FULL_TO_SHORT[pan.gua.name] || pan.gua.name?.[0] || pan.gua.name;
      const shiIdx = SHI_YING[shortName];
      if (shiIdx) {
        const shiYao = pan.yaoList[shiIdx.shi - 1];
        const yingYao = pan.yaoList[shiIdx.ying - 1];
        if (shiYao) facts.push(`【事实·世爻】第${shiIdx.shi}爻${shiYao.name}${shiYao.gan}${shiYao.zhi}（${shiYao.liuqin}）持世${shiYao.isDong ? '且发动' : ''}`);
        if (yingYao) facts.push(`【事实·应爻】第${shiIdx.ying}爻${yingYao.name}${yingYao.gan}${yingYao.zhi}（${yingYao.liuqin}）应爻${yingYao.isDong ? '且发动' : ''}`);
        // 世应关系
        if (shiYao && yingYao) {
          const shiWx = shiYao.wuxing, yingWx = yingYao.wuxing;
          const SHENG = { '木':'火','火':'土','土':'金','金':'水','水':'木' };
          const KE = { '木':'土','土':'水','水':'火','火':'金','金':'木' };
          if (SHENG[shiWx] === yingWx) facts.push(`【事实·世应生克】世爻${shiWx}生应爻${yingWx}（我生对方，主耗）`);
          else if (SHENG[yingWx] === shiWx) facts.push(`【事实·世应生克】应爻${yingWx}生世爻${shiWx}（对方生我，主吉）`);
          else if (KE[shiWx] === yingWx) facts.push(`【事实·世应生克】世爻${shiWx}克应爻${yingWx}（我克对方，主胜）`);
          else if (KE[yingWx] === shiWx) facts.push(`【事实·世应生克】应爻${yingWx}克世爻${shiWx}（对方克我，主凶）`);
          else facts.push(`【事实·世应生克】世应五行同为${shiWx}（比和，主平稳）`);
        }
      }
    }

    // 【新增】用神月令旺衰（按"问测类型"找用神爻，再看其在月令是否得令）
    if (pan.yaoList && pan.timeGanzhi) {
      const monthZhi = pan.timeGanzhi.month[1];
      const WX = { '木':'木','火':'火','土':'土','金':'金','水':'水','子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水' };
      // 通用用神判定（无具体问测类型时，按"妻财"看财运）
      // 用户没传 question 类别，做一个简化版：列出各六亲在月令的旺衰
      const liuQinList = ['妻财', '官鬼', '父母', '兄弟', '子孙'];
      const zhiMain = { '寅':'木','卯':'木','巳':'火','午':'火','申':'金','酉':'金','亥':'水','子':'水','辰':'土','戌':'土','丑':'土','未':'土' };
      const monthMain = zhiMain[monthZhi];
      const SHENG = { '木':'火','火':'土','土':'金','金':'水','水':'木' };
      const SHENGED = { '木':'水','火':'木','土':'火','金':'土','水':'金' };
      for (const lq of liuQinList) {
        const yls = pan.yaoList.filter(y => y.liuqin === lq);
        if (yls.length === 0) continue;
        const ylWx = yls[0].wuxing;
        // 真正的"得令"判定：同/生旺月令为得令
        let status;
        if (ylWx === monthMain) status = '旺（与月令比和）';
        else if (SHENGED[ylWx] === monthMain) status = '得令（月令生）';
        else if (SHENG[monthMain] === ylWx) status = '失令（生月令，泄）';
        else status = '受克（月令克）';
        facts.push(`【事实·月令】${lq}爻五行${ylWx}在月支${monthZhi}（本气${monthMain}）：${status}`);
      }
    }

    // 【新增】卦变分析（本卦 → 变卦）—— 输出变卦具体爻象
    if (pan.gua.dongYaoList && pan.gua.dongYaoList.length > 0) {
      const dongList = pan.gua.dongYaoList;
      // 获取变卦信息（liuyao.js 的 getGuaImage 已计算 bianGuaLines）
      // 需要重新计算变卦名称
      const benLines = pan.gua.lines || [];
      const bianLines = benLines.map((v, i) => {
        const yaoIdx = [3, 2, 1, 6, 5, 4][i]; // lineIdx → 爻位
        return dongList.includes(yaoIdx) ? 1 - v : v;
      });
      // 变卦上下卦
      const bianLower = [bianLines[2], bianLines[1], bianLines[0]];
      const bianUpper = [bianLines[5], bianLines[4], bianLines[3]];
      let bianLowerNum, bianUpperNum;
      for (let n = 1; n <= 8; n++) {
        if (arraysEqual(GUA_NAME[n][2], bianLower)) bianLowerNum = n;
        if (arraysEqual(GUA_NAME[n][2], bianUpper)) bianUpperNum = n;
      }
      const bianGuaName = bianLowerNum && bianUpperNum ? LIUSHISIGUA[`${bianUpperNum},${bianLowerNum}`] : '未知';
      
      facts.push(`【事实·变卦】动爻${dongList.length}个（第${dongList.join('、')}爻），本卦${pan.gua.name} → 变卦${bianGuaName}`);
      
      // 变爻具体信息（含变卦六亲）
      const bianYaoDetails = dongList.map(d => {
        const yao = pan.yaoList[d - 1];
        // 变出之爻的六亲：从变卦纳甲中获取
        let bianLiuQin = '未知';
        if (pan.bianYaoList && pan.bianYaoList[d - 1]) {
          bianLiuQin = pan.bianYaoList[d - 1].liuqin;
        }
        // 变出之爻：阳动变阴，阴动变阳
        const bianYaoType = yao.name.includes('阳') ? '阴' : '阳';
        return `${yao.name}${yao.gan}${yao.zhi}(${yao.liuqin}) → 变${bianYaoType}(${bianLiuQin})`;
      });
      facts.push(`【事实·变爻详情】${bianYaoDetails.join('；')}`);

      // 变卦整体六亲分布（供AI参考变卦趋势）
      if (pan.bianYaoList) {
        const bianLiuQinCount = {};
        for (const by of pan.bianYaoList) {
          bianLiuQinCount[by.liuqin] = (bianLiuQinCount[by.liuqin] || 0) + 1;
        }
        const bianLiuQinDist = Object.entries(bianLiuQinCount)
          .sort((a, b) => b[1] - a[1])
          .map(([lq, c]) => `${lq}${c}个`)
          .join('、');
        facts.push(`【事实·变卦六亲分布】${bianGuaName}：${bianLiuQinDist}`);
      }
    }
  }

  return facts.join('\n') + '\n';
};

// ============= 奇门专家系统 =============
Expert.qimen = function(pan) {
  const facts = [];
  facts.push(`【事实·局数】${pan.jushu_text}（${pan.jieqi}节气，已过${pan.days_in_jq}天）`);
  facts.push(`【事实·四柱】${pan.bazi.join(' ')}`);
  facts.push(`【事实·旬首】${pan.xunshou}`);

  // 值符值使
  if (pan.gong9) {
    const zf = pan.gong9.find(g => g.is_dipan_zhifu);
    const zs = pan.gong9.find(g => g.is_renpan_zhishi);
    if (zf) facts.push(`【事实·值符】地盘值符在${zf.name}（${zf.dipan}）`);
    if (zs) {
      const step = zs.zhishi_step != null ? zs.zhishi_step : 0;
      let stage = '';
      if (step === 0) stage = '起点，事情刚启动';
      else if (step <= 2) stage = '初期，正在发展';
      else if (step <= 5) stage = '中期，关键阶段';
      else stage = '后期，接近尾声';
      facts.push(`【事实·值使】人盘值使${zs.renpan}在${zs.name}（${pan.yang_dun ? '阳遁顺行' : '阴遁逆行'}第${step}步，${stage}）`);
    }

    // 生门/死门方位
    const sheng = pan.gong9.find(g => g.renpan === '生门');
    const si = pan.gong9.find(g => g.renpan === '死门');
    if (sheng) facts.push(`【事实·生门】生门在${sheng.name}（${sheng.direction}），主财位`);
    if (si) facts.push(`【事实·死门】死门在${si.name}（${si.direction}），主凶位`);

    // 【新增】吉格/凶格识别
    const jiGeList = [], xiongGeList = [];
    for (const g of pan.gong9) {
      const tianPan = g.tianpan; // 天盘
      const diPan = g.dipan;     // 地盘
      if (!tianPan || !diPan) continue;
      
      // 吉格检查
      if (tianPan === '戊' && diPan === '丙') jiGeList.push(`青龙返首（${g.name}）`);
      if (tianPan === '丙' && diPan === '戊') jiGeList.push(`飞鸟跌穴（${g.name}）`);
      if (tianPan === '乙' && diPan === '丙') jiGeList.push(`日月并行（${g.name}）`);
      if (tianPan === '丙' && diPan === '乙') jiGeList.push(`三奇得使（${g.name}）`);
      
      // 凶格检查
      if (tianPan === '辛' && diPan === '乙') xiongGeList.push(`白虎猖狂（${g.name}）`);
      if (tianPan === '乙' && diPan === '辛') xiongGeList.push(`青龙逃走（${g.name}）`);
      if (tianPan === '丁' && diPan === '癸') xiongGeList.push(`朱雀投江（${g.name}）`);
      if (tianPan === '癸' && diPan === '丁') xiongGeList.push(`螣蛇夭矫（${g.name}）`);
      if (tianPan === '丙' && diPan === '庚') xiongGeList.push(`荧惑入白（${g.name}）`);
      if (tianPan === '庚' && diPan === '丙') xiongGeList.push(`白入荧惑（${g.name}）`);
      if (tianPan === '庚') {
        // 庚加年/月/日/时干为悖格
        const yearGan = pan.bazi[0][0];
        const monthGan = pan.bazi[1][0];
        const dayGan = pan.bazi[2][0];
        const hourGan = pan.bazi[3][0];
        if (diPan === yearGan) xiongGeList.push(`岁悖格（${g.name}）`);
        if (diPan === monthGan) xiongGeList.push(`月悖格（${g.name}）`);
        if (diPan === dayGan) xiongGeList.push(`日悖格（${g.name}）`);
        if (diPan === hourGan) xiongGeList.push(`时悖格（${g.name}）`);
      }
    }
    
    if (jiGeList.length > 0) facts.push(`【事实·吉格】${jiGeList.join('、')}`);
    if (xiongGeList.length > 0) facts.push(`【事实·凶格】${xiongGeList.join('、')}`);
    
    // 【新增】门迫检查（门克宫）
    const MEN_WX = { '开门':'金','休门':'水','生门':'土','伤门':'木','杜门':'木','景门':'火','死门':'土','惊门':'金' };
    const GONG_WX = { '坎一宫':'水','坤二宫':'土','震三宫':'木','巽四宫':'木','中五宫':'土','乾六宫':'金','兑七宫':'金','艮八宫':'土','离九宫':'火' };
    const KE = { '金':'木','木':'土','土':'水','水':'火','火':'金' };
    const menPoList = [];
    for (const g of pan.gong9) {
      if (!g.renpan || !g.name) continue;
      const menWx = MEN_WX[g.renpan];
      const gongWx = GONG_WX[g.name];
      if (menWx && gongWx && KE[menWx] === gongWx) {
        menPoList.push(`${g.renpan}克${g.name}（${menWx}克${gongWx}）`);
      }
    }
    if (menPoList.length > 0) facts.push(`【事实·门迫】${menPoList.join('、')}—— 门克宫，力量受制`);
    
    // 【新增】入墓检查
    const RU_MU = { '乙':'乾六宫','丙':'乾六宫','丁':'艮八宫','戊':'乾六宫','己':'艮八宫','庚':'艮八宫','辛':'巽四宫','壬':'巽四宫','癸':'坤二宫' };
    const ruMuList = [];
    for (const g of pan.gong9) {
      if (!g.tianpan) continue;
      const muGong = RU_MU[g.tianpan];
      if (muGong && g.name === muGong) {
        ruMuList.push(`${g.tianpan}入墓于${g.name}`);
      }
    }
    if (ruMuList.length > 0) facts.push(`【事实·入墓】${ruMuList.join('、')}—— 力量潜藏不出`);
  }

  return facts.join('\n') + '\n';
};

Expert.ziwei = function(chart) {
  const facts = [];
  if (chart.mingGong && chart.mingGong.name) {
    facts.push(`【事实·命宫】命宫在${chart.mingGong.name}（${chart.mingGong.ganzhi}）`);
    const mainStars = chart.mingGong.stars?.filter(s => s.type === 'main').map(s => s.name) || [];
    if (mainStars.length > 0) {
      facts.push(`【事实·命宫主星】${mainStars.join('、')}`);
    }
  }
  if (chart.siHua && Object.keys(chart.siHua).length > 0) {
    const siHuaStr = Object.entries(chart.siHua).map(([k,v]) => `${v}${k}`).join(' ');
    facts.push(`【事实·四化】${siHuaStr}`);
  }

  // 【新增】按生年天干查四化（事实层校对）
  if (chart.mingGong && chart.mingGong.ganzhi) {
    const yearGan = chart.mingGong.ganzhi ? null : null; // chart没有年干信息
    // 跳过：chart 实际是从 iztro 适配的，siHua 字段已经由 iztro 算好
  }

  // 【新增】三方四正（命宫+对宫+三合宫）吉星密度
  if (chart.palaces && Array.isArray(chart.palaces) && chart.mingGong) {
    const SAN_HE_GONG = {
      '命宫': ['命宫'],
      '兄弟': ['兄弟宫'],
      '夫妻': ['夫妻宫'],
      '子女': ['子女宫'],
      '财帛': ['财帛宫'],
      '疾厄': ['疾厄宫'],
      '迁移': ['迁移宫'],
      '交友': ['交友宫','奴仆宫'],
      '事业': ['官禄宫'],
      '田宅': ['田宅宫'],
      '福德': ['福德宫'],
      '父母': ['父母宫']
    };
    // 找命宫索引
    const mingIdx = chart.palaces.findIndex(p => p.isMing);
    if (mingIdx >= 0) {
      // 三方四正 = 命宫+对宫(隔6位)+三合(隔4位)
      const oppIdx = (mingIdx + 6) % 12;
      const triIdx1 = (mingIdx + 4) % 12;
      const triIdx2 = (mingIdx + 8) % 12;
      const sifang = [chart.palaces[mingIdx], chart.palaces[oppIdx], chart.palaces[triIdx1], chart.palaces[triIdx2]];
      const allStars = sifang.flatMap(p => (p.stars || []).map(s => s.name));
      const jiStars = ['紫微','天府','太阳','太阴','天同','天梁','左辅','右弼','文昌','文曲','天魁','天钺'];
      const xiongStars = ['擎羊','陀罗','火星','铃星','地空','地劫'];
      const jiCount = allStars.filter(s => jiStars.includes(s)).length;
      const xiongCount = allStars.filter(s => xiongStars.includes(s)).length;
      facts.push(`【事实·三方四正】命宫三方四正(${sifang.map(p => p.name).join('、')})，吉星${jiCount}颗，煞星${xiongCount}颗。${xiongCount > jiCount ? '煞星偏多，需化煞' : jiCount >= 3 ? '吉星汇聚，格局清奇' : '吉煞参半'}`);
    }
  }

  // 【新增】大限流年
  if (chart.horoscope) {
    const hs = chart.horoscope;
    if (hs.decadal) {
      const d = hs.decadal;
      const mutagenStr = d.mutagen?.length === 4 ? `${d.mutagen[0]}化禄 ${d.mutagen[1]}化权 ${d.mutagen[2]}化科 ${d.mutagen[3]}化忌` : '';
      facts.push(`【事实·大限】当前行${d.name}，在${d.palace}（${d.ganzhi}）${mutagenStr ? '，大限四化：' + mutagenStr : ''}`);
      // 大限与命宫关系
      if (d.palace === chart.mingGong?.name) {
        facts.push(`【事实·大限命宫重叠】大限命宫与原命宫重叠，十年运势与先天格局共振，吉凶加倍`);
      }
    }
    if (hs.age) {
      facts.push(`【事实·小限】当前${hs.age.nominalAge}岁，小限在${hs.age.palace}（${hs.age.ganzhi}）`);
    }
    if (hs.yearly) {
      const y = hs.yearly;
      const mutagenStr = y.mutagen?.length === 4 ? `${y.mutagen[0]}化禄 ${y.mutagen[1]}化权 ${y.mutagen[2]}化科 ${y.mutagen[3]}化忌` : '';
      facts.push(`【事实·流年】当前${y.name}，在${y.palace}（${y.ganzhi}）${mutagenStr ? '，流年四化：' + mutagenStr : ''}`);
      // 流年与大限关系
      if (hs.decadal && y.palace === hs.decadal.palace) {
        facts.push(`【事实·流年大限重叠】流年命宫与大限命宫重叠，该年运势为十年峰值`);
      }
    }
  }

  return facts.join('\n') + '\n';
};

// ============= 量化评分系统 =============
Expert.score = function(domain, pan) {
  const scores = {};
  
  if (domain === 'bazi') {
    // 八字评分：五行平衡度、十神配置、大运配合
    const wuxing = pan.wuxing || {};
    const total = Object.values(wuxing).reduce((a, b) => a + b, 0) || 1;
    const balance = 100 - Math.max(...Object.values(wuxing)) / total * 100;
    scores.balance = Math.round(balance);
    scores.career = pan.shiShen?.['正官'] || pan.shiShen?.['七杀'] ? 75 : 50;
    scores.wealth = pan.shiShen?.['正财'] || pan.shiShen?.['偏财'] ? 70 : 45;
    scores.marriage = pan.shiShen?.['正财'] || pan.shiShen?.['正官'] ? 72 : 48;
    scores.health = balance > 70 ? 75 : 55;
  }
  
  if (domain === 'ziwei') {
    // 紫微评分：格局高低、吉星数量、煞星数量
    const stars = pan.stars || [];
    const goodStars = stars.filter(s => ['紫微','天府','太阳','太阴','天同','天梁','左辅','右弼','文昌','文曲','天魁','天钺'].includes(s)).length;
    const badStars = stars.filter(s => ['擎羊','陀罗','火星','铃星','地空','地劫'].includes(s)).length;
    scores.pattern = Math.min(95, 60 + goodStars * 5 - badStars * 3);
    scores.career = goodStars >= 3 ? 78 : 52;
    scores.wealth = stars.includes('武曲') || stars.includes('天府') ? 80 : 50;
    scores.marriage = stars.includes('太阳') || stars.includes('太阴') ? 75 : 48;
    scores.health = badStars <= 2 ? 72 : 45;
  }
  
  if (domain === 'liuyao') {
    // 六爻评分：用神旺衰、动爻数量、世应关系
    const yaoList = pan.yaoList || [];
    const dongYao = yaoList.filter(y => y.isDong).length;
    const shiYao = yaoList.find(y => y.isShi);
    const yingYao = yaoList.find(y => y.isYing);
    scores.accuracy = dongYao >= 1 && dongYao <= 3 ? 80 : 55;
    scores.timing = dongYao > 0 ? 75 : 40;
    scores.outcome = shiYao && yingYao ? 70 : 45;
  }
  
  if (domain === 'qimen') {
    // 奇门评分：吉格凶格、吉门吉星、值符值使
    const gong9 = pan.gong9 || [];
    const goodMen = ['休门','生门','开门'];
    const badMen = ['死门','惊门','伤门'];
    const goodCount = gong9.filter(g => goodMen.includes(g.renpan)).length;
    const badCount = gong9.filter(g => badMen.includes(g.renpan)).length;
    scores.opportunity = goodCount >= 2 ? 78 : 50;
    scores.risk = badCount <= 2 ? 72 : 40;
    scores.timing = pan.zhishi ? 75 : 45;
  }
  
  if (domain === 'xingshi') {
    // 姓名评分：五格吉凶、三才配置、数理得分
    // xingshi.calculateGege() 返回扁平对象 {tiange, renge, ...},无 wuge wrapper
    const ge = pan.wuge || pan;
    const goodGe = [1,3,5,6,7,8,11,13,15,16,17,18,21,23,24,25,31,32,33,35,37,39,41,45,47,48,52,57,61,63,65,67,68,81];
    const scores_list = [ge.tiange, ge.renge, ge.dige, ge.waige, ge.zongge].map(g => goodGe.includes(g) ? 80 : 50);
    scores.overall = Math.round(scores_list.reduce((a,b)=>a+b,0) / 5);
    scores.career = scores_list[1]; // 人格
    scores.wealth = scores_list[0]; // 天格
    scores.health = scores_list[2]; // 地格
  }
  
  // 统一格式
  const result = [];
  for (const [k, v] of Object.entries(scores)) {
    result.push(`${k === 'balance' ? '五行平衡' : k === 'pattern' ? '格局高低' : k === 'accuracy' ? '准确度' : k === 'timing' ? '时机把握' : k === 'outcome' ? '结果预测' : k === 'opportunity' ? '机遇指数' : k === 'risk' ? '风险指数' : k === 'overall' ? '综合评分' : k === 'career' ? '事业运' : k === 'wealth' ? '财运' : k === 'marriage' ? '婚姻运' : k === 'health' ? '健康运' : k}: ${v}分`);
  }
  return result.join(' | ');
};
